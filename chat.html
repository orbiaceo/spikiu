<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Spikiu — Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white:   #ffffff;
  --bg:      #faf9f7;
  --bg2:     #f3f1ee;
  --ink:     #1a1816;
  --mid:     #6b6560;
  --faint:   #e8e4df;
  --warm:    #d4cdc6;
  --accent:  #2d6a4f;
  --accent2: #e8f2ed;
  --accent3: #1a4a38;
  --capy:    #c9956a;
}

html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; background: var(--white); }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem 0.875rem;
  border-bottom: 1px solid var(--faint);
  background: var(--white);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 0.65rem; }
.capy-icon { width: 36px; height: 36px; flex-shrink: 0; }
.brand-name { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
.brand-name em { color: var(--accent); font-style: italic; }
.status-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.85); } }

.back-link { font-size: 0.82rem; color: var(--mid); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; font-weight: 500; transition: color 0.2s; }
.back-link:hover { color: var(--ink); }

/* ── CHAT ── */
.chat { flex: 1; overflow-y: auto; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; scroll-behavior: smooth; }
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 10px; }

.message { display: flex; gap: 0.75rem; animation: fadeUp 0.3s ease forwards; opacity: 0; }
.message.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.avatar-spikiu { background: var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; flex-shrink: 0; margin-top: 2px; }

.bubble { max-width: 82%; padding: 0.85rem 1.1rem; border-radius: 1.2rem; font-size: 1rem; line-height: 1.65; }
.bubble.spikiu { background: var(--bg2); color: var(--ink); border-radius: 0.3rem 1.2rem 1.2rem 1.2rem; font-family: 'Lora', serif; font-size: 1.025rem; }
.bubble.user { background: var(--accent); color: var(--white); border-radius: 1.2rem 0.3rem 1.2rem 1.2rem; font-size: 0.975rem; }

.typing-bubble { background: var(--bg2); border-radius: 0.3rem 1.2rem 1.2rem 1.2rem; padding: 0.9rem 1.1rem; display: flex; gap: 5px; align-items: center; }
.typing-bubble span { width: 7px; height: 7px; background: var(--warm); border-radius: 50%; animation: bounce 1.3s infinite; }
.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%,80%,100% { transform:translateY(0); background:var(--warm); } 40% { transform:translateY(-5px); background:var(--capy); } }

/* ── WELCOME ── */
.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 2rem 1rem; text-align: center; gap: 1rem; }
.welcome-capy { width: 88px; height: 88px; margin-bottom: 0.5rem; animation: float 4s ease-in-out infinite; }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
.welcome h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1.2; }
.welcome h1 em { font-style: italic; color: var(--accent); }
.welcome p { color: var(--mid); font-size: 0.975rem; line-height: 1.65; max-width: 300px; }
.start-btn { margin-top: 0.5rem; background: var(--accent); color: var(--white); border: none; border-radius: 100px; padding: 0.85rem 2.2rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.start-btn:hover { background: var(--accent3); transform: translateY(-1px); }
.welcome-note { font-size: 0.78rem; color: var(--warm); margin-top: 0.25rem; }

/* ── INPUT ── */
.input-area { flex-shrink: 0; padding: 0.875rem 1.25rem; border-top: 1px solid var(--faint); background: var(--white); padding-bottom: calc(0.875rem + env(safe-area-inset-bottom)); }
.input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
textarea { flex: 1; background: var(--bg2); border: 1.5px solid transparent; border-radius: 1.2rem; padding: 0.75rem 1.1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--ink); resize: none; outline: none; min-height: 48px; max-height: 130px; line-height: 1.5; transition: border-color 0.2s, background 0.2s; }
textarea:focus { border-color: var(--accent); background: var(--white); }
textarea::placeholder { color: var(--mid); font-style: italic; }
.send-btn { width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 50%; color: var(--white); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.send-btn:hover { background: var(--accent3); transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; transform: translateX(1px); }

@media (max-width: 480px) {
  header { padding: 0.875rem 1rem 0.75rem; }
  .chat { padding: 1.25rem 1rem; gap: 1rem; }
  .input-area { padding: 0.75rem 1rem; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
  .bubble { max-width: 88%; }
  .welcome { padding: 1.5rem 1.5rem 1rem; }
  .welcome h1 { font-size: 1.5rem; }
}

@media (min-width: 680px) {
  body { background: var(--bg2); }
  .app { margin: 1.5rem auto; height: calc(100dvh - 3rem); border-radius: 1.5rem; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
}
</style>
</head>

// ── MARKDOWN PARSER ────────────────────────────────────
function parseMarkdown(text) {
  return text
    .replace(/^#{4}\s+(.+)$/gm, '<h4 style="font-family:\'Lora\',serif;font-size:1rem;font-weight:700;color:#1a1816;margin:1rem 0 0.3rem;">$1</h4>')
    .replace(/^#{3}\s+(.+)$/gm, '<h3 style="font-family:\'Lora\',serif;font-size:1.1rem;font-weight:700;color:#1a1816;margin:1.2rem 0 0.4rem;">$1</h3>')
    .replace(/^#{2}\s+(.+)$/gm, '<h2 style="font-family:\'Lora\',serif;font-size:1.2rem;font-weight:700;color:#2d6a4f;margin:1.5rem 0 0.5rem;">$1</h2>')
    .replace(/^#{1}\s+(.+)$/gm, '<h1 style="font-family:\'Lora\',serif;font-size:1.4rem;font-weight:700;color:#2d6a4f;margin:1.5rem 0 0.5rem;">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid #e8e4df;margin:1rem 0;">')
    .replace(/^[-•]\s+(.+)$/gm, '<li style="margin:0.3rem 0;padding-left:0.5rem;">$1</li>')
    .replace(/(<li.*<\/li>\n?)+/g, '<ul style="list-style:none;padding:0;margin:0.5rem 0;">$&</ul>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function markdownToPlain(text) {
  return text
    .replace(/^#{1,4}\s+/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/^---+$/gm, '────────────────────────')
    .replace(/^[-•]\s+/gm, '  • ')
    .replace(/^\d+\.\s+/gm, m => '  ' + m);
}

// ── ADD MESSAGE ────────────────────────────────────────
function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;

  const hasPDF  = text.includes('[PDF_AVAILABLE]');
  const hasHTML = text.includes('[HTML_EXERCISE]');

  let cleanText = hasPDF
    ? text.split('[PDF_AVAILABLE]')[0].replace('[HTML_EXERCISE]', '').trim()
    : text.replace('[HTML_EXERCISE]', '').trim();

  const pdfContent = hasPDF ? text.split('[PDF_AVAILABLE]')[1].trim() : cleanText;

  let htmlContent = '';
  if (hasHTML) {
    const m = cleanText.match(/\[html\]([\s\S]*?)\[\/html\]/);
    if (m) { htmlContent = m[1].trim(); cleanText = cleanText.replace(/\[html\][\s\S]*?\[\/html\]/, '').trim(); }
  }

  if (role === 'spikiu') {
    const rendered = parseMarkdown(cleanText);
    let extra = '';
    if (htmlContent) {
      const safe = htmlContent.replace(/"/g, '&quot;');
      extra += '<div style="margin-top:0.8rem;border:1.5px solid #e8e4df;border-radius:12px;overflow:hidden;">';
      extra += '<div style="background:#f3f1ee;padding:0.4rem 1rem;font-size:0.72rem;font-weight:600;color:#6b6560;">Interactive exercise</div>';
      extra += '<iframe srcdoc="' + safe + '" style="width:100%;border:none;height:280px;"></iframe></div>';
    }
    if (hasPDF) {
      extra += '<button onclick="downloadPDF(this)" data-content="' + encodeURIComponent(pdfContent) + '" style="margin-top:0.6rem;background:#2d6a4f;color:white;border:none;border-radius:100px;padding:0.5rem 1.2rem;font-size:0.82rem;font-family:DM Sans,sans-serif;cursor:pointer;">⬇ Download PDF</button>';
    }
    msg.innerHTML = '<div class="avatar-spikiu">' + CAPY_SMALL + '</div><div style="flex:1;min-width:0;"><div class="bubble spikiu">' + rendered + '</div>' + extra + '</div>';
  } else {
    msg.innerHTML = '<div class="bubble user">' + text.split('\n').join('<br>') + '</div>';
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

// ── PDF DOWNLOAD ───────────────────────────────────────
function downloadPDF(btn) {
  const raw = decodeURIComponent(btn.getAttribute('data-content'));
  const plain = markdownToPlain(raw);
  const date = new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'long', year:'numeric' });
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Spikiu</title>
  <style>body{font-family:Georgia,serif;max-width:680px;margin:40px auto;padding:0 2rem;color:#1a1612;line-height:1.8;font-size:15px;}
  .header{border-bottom:2px solid #2d6a4f;padding-bottom:1.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;}
  .logo{font-family:Georgia,serif;font-size:1.8rem;font-weight:700;color:#2d6a4f;}.date{font-size:0.8rem;color:#888;}
  pre{white-space:pre-wrap;font-size:15px;line-height:1.8;}
  .footer{margin-top:3rem;padding-top:1rem;border-top:1px solid #e8e0d5;font-size:0.75rem;color:#aaa;text-align:center;}
  @media print{body{margin:20px;}}</style></head><body>
  <div class="header"><span class="logo">Spikiu</span><span class="date">${date}</span></div>

// ── TYPING INDICATOR ───────────────────────────────────
function showTyping() {
  const chat = document.getElementById('chat');
  const t = document.createElement('div');
  t.className = 'message spikiu'; t.id = 'typing';
  t.innerHTML = `<div class="avatar-spikiu">${CAPY_SMALL}</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

// ── TOKEN SCALING ──────────────────────────────────────
function getMaxTokens(text) {
  const w = text.trim().split(/\s+/).length;
  const structural = /vocabular|list|exercise|exam|grammar|dialog|plan|pdf|write|create|prepare|explain|lesson|quiz|homework|translate/i.test(text);
  if (structural) return 3500;
  if (w <= 2)  return 120;
  if (w <= 5)  return 200;
  if (w <= 15) return 400;
  if (w <= 30) return 600;
  return 800;
}

// ── API CALL ───────────────────────────────────────────
async function callAPI(system, messages, maxTokens) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages, maxTokens })
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  return d.content[0].text;
}

// ── START CHAT ─────────────────────────────────────────
async function startChat() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'block';

  const input = document.getElementById('userInput');
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 130) + 'px';
    document.getElementById('sendBtn').disabled = this.value.trim() === '';
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (this.value.trim()) sendMessage();
    }
  });

  // Phase 0 — Disclaimer
  addMessage('spikiu', "👋 Quick note before we start:\n\nYou're part of our beta. After this chat everything is deleted — no data, no memory.\n\nIn the future you'll be able to log in and Spikiu will remember you, your goals and your story. 🐾\n\nBut now — let's talk.");
  phase = 1;

  // Ask native language — no API needed
  setTimeout(() => {
    addMessage('spikiu', "Welcome to Spikiu! 🐾\n\nWhat is your mother language?");
  }, 1200);

  input.focus();
}

// ── SUBMIT FORM ────────────────────────────────────────
async function submitForm() {
  const name     = document.getElementById('f-name').value.trim();
  const target   = document.getElementById('f-target').value;
  const reason   = document.getElementById('f-reason').value;
  const level    = document.getElementById('f-level').value;
  const goal     = document.getElementById('f-goal').value.trim();
  const deadline = document.getElementById('f-deadline').value.trim();
  const time     = document.getElementById('f-time').value;

  if (!name || !target || !reason || !level || !goal || !deadline || !time) {
    alert('Bitte alle Felder ausfüllen / Please fill all fields');
    return;
  }

  // Store in profile
  userProfile.name       = name;
  userProfile.targetLang = target;

  // Show user summary
  addMessage('user', `${name} · ${target} · ${reason} · ${level} · ${goal} · ${deadline} · ${time}`);

  // Hide form, show input
  document.getElementById('inputArea').style.display = 'block';
  phase = 3;

  // Build history from form data
  history = [{
    role: 'user',
    content: `Assessment form submitted:
Name: ${name}
Native language: ${userProfile.nativeLang}
Target language: ${target}
Reason: ${reason}
Current level: ${level}
Goal: ${goal}
Deadline: ${deadline}
Time per week: ${time}
Today's date: ${new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' })}`
  }];

  // Show typing indicator only
  showTyping();

  try {
    // Generate full plan
    const planReply = await callAPI(
      `You are a language learning expert. Generate a COMPLETE personalised learning plan. Write ENTIRELY in ${userProfile.nativeLang}. Use Markdown formatting. Be thorough and complete. End with: *Created by Spikiu · spikiu.com*`,
      history,
      3500
    );
    hideTyping();

    // Show PDF download button
    addMessage('spikiu', '[PDF_AVAILABLE]' + planReply);

    // Invite to start conversation
    const inviteMsg = userProfile.nativeLang === 'Deutsch'
      ? 'Dein Lernpfad ist fertig — du kannst ihn herunterladen. 🌱\nBereit für dein erstes Gespräch auf Spanisch?'
      : userProfile.nativeLang === 'Español'
      ? 'Tu camino está listo — puedes descargarlo. 🌱\n¿Listo/a para tu primera conversación?'
      : 'Your learning path is ready — download it above. 🌱\nReady for your first conversation?';

    addMessage('spikiu', inviteMsg);
    phase = 3;

  } catch(e) {
    hideTyping();
    addMessage('spikiu', 'Something went wrong. Try again? 🐾');
  }
}

// ── SEND MESSAGE ───────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  exchangeCount++;
  addMessage('user', text);
  showTyping();

  try {
    let reply = '';

    // ── PHASE 1: Detect native language → show invitation ──
    if (phase === 1) {
      // Detect native language from user input
      const parsed = await callAPI(
        'The user just told you their native language. Reply ONLY with the language name in English. Examples: "German", "Spanish", "English", "Chinese", "French", "Polish", "Russian", "Japanese", "Arabic", "Portuguese". No other text.',
        [{ role: 'user', content: text }],
        10
      );
      const detected = parsed.trim();
      // Map to our supported UI labels, or keep as-is for others
      const langMap = { 'German':'Deutsch', 'Spanish':'Español', 'English':'English',
        'Chinese':'Chinese', 'French':'French', 'Portuguese':'Portuguese',
        'Russian':'Russian', 'Japanese':'Japanese', 'Arabic':'Arabic',
        'Polish':'Polish', 'Italian':'Italian', 'Dutch':'Dutch' };
      userProfile.nativeLang = langMap[detected] || detected || 'English';

      const inviteFn = INVITATION[userProfile.nativeLang] || INVITATION['default'];

      // Ask name as part of invitation — detect name from next message
      const knownNamePrompts = {
        'Deutsch': 'Und wie heißt du?',
        'Español': '¿Y cómo te llamas?',
        'English': 'And what is your name?',
        'Chinese': '你叫什么名字？',
        'French':  'Et comment tu t\'appelles ?',
        'Portuguese': 'E qual é o teu nome?',
        'Russian': 'Как тебя зовут?',
        'Japanese': 'お名前は？',
        'Arabic':  'وما اسمك؟',
        'Polish':  'Jak masz na imię?',
        'Italian': 'E come ti chiami?',
        'Dutch':   'En hoe heet je?'
      };
      const namePrompt = knownNamePrompts[userProfile.nativeLang] || 'What is your name?';

      hideTyping();
      addMessage('spikiu', namePrompt);
      phase = 1.5;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
      return;
    }

    // ── PHASE 1.5: Got name → show invitation ──
    else if (phase === 1.5) {
      userProfile.name = text;
      const inviteFn = INVITATION[userProfile.nativeLang] || INVITATION['default'];
      hideTyping();
      addMessage('spikiu', inviteFn(userProfile.name));
      phase = 1.8; // waiting for confirmation to show form
      document.getElementById('sendBtn').disabled = false;
      input.focus();
      return;
    }

    // ── PHASE 1.8: Confirmation → show form ──
    else if (phase === 1.8) {
      const yes = /ja|yes|sí|si|ok|bereit|ready|listo|klar|sure|oui|да/i.test(text);
      if (yes) {
        hideTyping();
        showAssessmentForm();
        document.getElementById('sendBtn').disabled = false;
        return;
      } else {
        // Not ready — stay friendly
        const notReady = userProfile.nativeLang === 'Deutsch'
          ? 'Kein Problem! Wenn du bereit bist, sag einfach Bescheid. 🐾'
          : userProfile.nativeLang === 'Español'
          ? '¡Sin problema! Cuando estés listo/a, dímelo. 🐾'
          : 'No problem! Just let me know when you\'re ready. 🐾';
        hideTyping();
        addMessage('spikiu', notReady);
        document.getElementById('sendBtn').disabled = false;
        input.focus();
        return;
      }
    }

    // ── PHASE 2: Needs analysis (kept for fallback) ──
    else if (phase === 2) {
      history.push({ role: 'user', content: text });

      const confirmed = /^(ja|yes|ok|gut|perfekt|einverstanden|sí|claro|genau|super|klar|gerne|sounds good|passt|alright|great|sure|perfect|agreed|let'?s go|proceed|weiter|los|machen wir|stimmt|passt so)/i.test(text.trim());
      const enoughExchanges = exchangeCount >= 3;

      if (confirmed && enoughExchanges) {
        // Plan confirmed — generate
        phase = 3;
        exchangeCount = 0;

        // Step 1: Confirmation sentence — with full context to prevent hallucination
        const confirmMsg = await callAPI(
          `You are SPIKIU. Write exactly 1 warm sentence in ${userProfile.nativeLang} confirming the learning path for ${userProfile.name} is ready as PDF. Their goal is to learn ${userProfile.targetLang}. Do NOT invent titles. Do NOT mention programming. Keep it simple and warm.`,
          [{ role: 'user', content: `Confirm the plan is ready for ${userProfile.name} who wants to learn ${userProfile.targetLang}.` }],
          80
        );
        hideTyping();
        addMessage('spikiu', confirmMsg);
        history.push({ role: 'assistant', content: confirmMsg });

        // Step 2: Full plan for PDF
        showTyping();
        const summary = history.map(m => m.role + ': ' + m.content).join('\n');
        const planReply = await callAPI(
          `You are a language learning expert. Generate a complete personalised learning plan based on the conversation. IMPORTANT: Write the ENTIRE plan in ${userProfile.nativeLang} — not in English. Use Markdown: ## for sections, ### for subsections, **bold** for key terms, - for lists. Write everything completely. End with: *Created by Spikiu · spikiu.com*`,
          [{ role: 'user', content: `Generate the complete learning plan in ${userProfile.nativeLang} from this conversation:\n\n` + summary }],
          3500
        );
        hideTyping();
        addMessage('spikiu', '[PDF_AVAILABLE]' + planReply);
        document.getElementById('sendBtn').disabled = false;
        input.focus();
        return;

      } else {
        // Continue needs analysis — use higher tokens when proposal is likely
        const tokens = exchangeCount >= 3 ? 800 : getMaxTokens(text);
        reply = await callAPI(
          SYSTEM_NEEDS(userProfile.name, userProfile.nativeLang, userProfile.targetLang),
          history,
          tokens
        );
        history.push({ role: 'assistant', content: reply });
      }
    }

    // ── PHASE 3: Free conversation ──
    else {
      history.push({ role: 'user', content: text });
      reply = await callAPI(
        SYSTEM_MAIN(userProfile.name, userProfile.nativeLang, userProfile.targetLang),
        history,
        getMaxTokens(text)
      );
      history.push({ role: 'assistant', content: reply });
    }

    hideTyping();
    addMessage('spikiu', reply);

  } catch(e) {
    hideTyping();
    addMessage('spikiu', 'Something went wrong. Try again? 🐾');
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
