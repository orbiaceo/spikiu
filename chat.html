<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white:   #ffffff;
  --bg:      #faf9f7;
  --bg2:     #f3f1ee;
  --ink:     #1c1917;
  --mid:     #78716c;
  --faint:   #e7e5e4;
  --warm:    #d6cfc8;
  --accent:  #2d6a4f;
  --accent2: #e8f5ee;
  --capy:    #a97c50;
}

html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 680px; margin: 0 auto; background: var(--white); }

header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem 0.875rem; border-bottom: 1px solid var(--faint); background: var(--white); flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 0.65rem; }
.capy-icon { width: 38px; height: 38px; flex-shrink: 0; }
.brand-name { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.brand-name span { color: var(--accent); font-style: italic; }
.status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

.chat { flex: 1; overflow-y: auto; padding: 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; scroll-behavior: smooth; }
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--warm); border-radius: 10px; }

.message { display: flex; gap: 0.75rem; animation: fadeUp 0.35s ease forwards; opacity: 0; }
.message.user { flex-direction: row-reverse; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.avatar-spikiu { background: var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; flex-shrink: 0; margin-top: 2px; }

.bubble { max-width: 82%; padding: 0.85rem 1.1rem; border-radius: 1.2rem; font-size: 1rem; line-height: 1.65; }
.bubble.spikiu { background: var(--bg2); color: var(--ink); border-radius: 0.3rem 1.2rem 1.2rem 1.2rem; font-family: 'Lora', serif; font-size: 1.025rem; }
.bubble.user { background: var(--accent); color: var(--white); border-radius: 1.2rem 0.3rem 1.2rem 1.2rem; font-size: 0.975rem; }

.typing-bubble { background: var(--bg2); border-radius: 0.3rem 1.2rem 1.2rem 1.2rem; padding: 0.9rem 1.1rem; display: flex; gap: 5px; align-items: center; }
.typing-bubble span { width: 7px; height: 7px; background: var(--warm); border-radius: 50%; animation: bounce 1.3s infinite; }
.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
@keyframes bounce { 0%, 80%, 100% { transform: translateY(0); background: var(--warm); } 40% { transform: translateY(-5px); background: var(--capy); } }

.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 2rem 1rem; text-align: center; gap: 1rem; }
.welcome-capy { width: 90px; height: 90px; margin-bottom: 0.5rem; animation: float 4s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.welcome h1 { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 500; color: var(--ink); letter-spacing: -0.02em; line-height: 1.2; }
.welcome h1 em { font-style: italic; color: var(--accent); }
.welcome p { color: var(--mid); font-size: 0.975rem; line-height: 1.65; max-width: 300px; }
.start-btn { margin-top: 0.5rem; background: var(--accent); color: var(--white); border: none; border-radius: 100px; padding: 0.85rem 2.2rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.start-btn:hover { background: #1f5239; transform: translateY(-1px); }
.welcome-note { font-size: 0.8rem; color: var(--warm); margin-top: 0.25rem; }

.input-area { flex-shrink: 0; padding: 0.875rem 1.25rem; border-top: 1px solid var(--faint); background: var(--white); padding-bottom: calc(0.875rem + env(safe-area-inset-bottom)); }
.input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
textarea { flex: 1; background: var(--bg2); border: 1.5px solid transparent; border-radius: 1.2rem; padding: 0.75rem 1.1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--ink); resize: none; outline: none; min-height: 48px; max-height: 130px; line-height: 1.5; transition: border-color 0.2s, background 0.2s; }
textarea:focus { border-color: var(--accent); background: var(--white); }
textarea::placeholder { color: var(--mid); font-style: italic; }
.send-btn { width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 50%; color: var(--white); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.send-btn:hover { background: #1f5239; transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; transform: translateX(1px); }

.back-link { font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--mid); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
.back-link:hover { color: var(--ink); }
.lesson-btn { background: var(--accent); color: var(--white); border: none; border-radius: 100px; padding: 0.4rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; transition: all 0.2s; white-space: nowrap; }
.lesson-btn:hover { background: #1f5239; transform: translateY(-1px); }
.lesson-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.header-right { display: flex; align-items: center; gap: 0.8rem; }

@media (max-width: 480px) {
  header { padding: 0.875rem 1rem 0.75rem; }
  .chat { padding: 1.25rem 1rem; gap: 1rem; }
  .input-area { padding: 0.75rem 1rem; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
  .bubble { max-width: 88%; }
  .welcome { padding: 1.5rem 1.5rem 1rem; }
  .welcome h1 { font-size: 1.5rem; }
}

@media (min-width: 680px) {
  body { background: var(--bg2); }
  .app { margin: 1.5rem auto; height: calc(100dvh - 3rem); border-radius: 1.5rem; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
}
</style>

<script>
const API = '/api/chat';

// в”Җв”Җ PHASE MANAGEMENT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Phase 0: Disclaimer (no API)
// Phase 1: Onboarding EN (name + native lang + target lang)
// Phase 2: Self-introduction + Needs Analysis (in native language)
// Phase 3: Free conversation

let phase = 0;
let history = [];
let exchangeCount = 0;
let userProfile = { name: '', nativeLang: '', targetLang: '' };
let lolaplan = '';

// в”Җв”Җ READ ASSESSMENT PROFILE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadLolaProfile() {
  try {
    const saved = localStorage.getItem('spikiu_profile');
    const savedPlan = localStorage.getItem('spikiu_plan');
    if (saved) {
      const p = JSON.parse(saved);
      userProfile.name = p.name || '';
      userProfile.nativeLang = p.nativeLang || '';
      userProfile.targetLang = p.targetLang || '';
      userProfile.goal = p.goal || '';
      userProfile.currentLevel = p.currentLevel || '';
      userProfile.hoursPerWeek = p.hoursPerWeek || '';
      userProfile.timeline = p.timeline || '';
      lolaplan = savedPlan || '';
      return !!(userProfile.name && userProfile.targetLang);
    }
  } catch(e) {}
  return false;
}

// в”Җв”Җ SYSTEM PROMPTS PER PHASE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const SYSTEM_ONBOARDING = `You are SPIKIU. Respond ONLY in English.
Ask the user their name. One warm sentence. Nothing else.`;

const SYSTEM_LANG = `You are SPIKIU. Respond ONLY in English.
You already know the user's name. Now ask in ONE friendly sentence:
what is their native language AND which language they want to speak with you.
Example: "Nice to meet you, [name]! What's your native language вҖ” and which language would you like to practice with me?"`;

const SYSTEM_NEEDS = (name, nativeLang, targetLang) => `You are SPIKIU вҖ” a warm companion, not a teacher.

User: ${name} | Native: ${nativeLang} | Learning: ${targetLang}
ALWAYS respond in ${nativeLang}.

YOUR JOB: Collect exactly these 4 things, one question at a time:
1. Current level in ${targetLang}
2. Concrete goal (what they want to DO with the language)
3. Timeline or deadline
4. Available time per week

RULES:
- ONE question per message. Short. Warm. Never two questions.
- No advice, no plan, no preview yet.
- Once you have all 4 answers, write a SHORT plan summary (4-6 lines max) directly in chat.
  Format it clearly but briefly вҖ” like a friend sketching it on a napkin.
  End with exactly this line: "Einverstanden?" (always this word, regardless of language)
- After that: wait. Do nothing else.`;

const SYSTEM_MAIN = (name, nativeLang, targetLang) => `You are SPIKIU вҖ” a language companion. Not a teacher in the traditional sense вҖ” a companion, a presence.

IDENTITY
No hierarchy. No judgment. Two beings helping each other. Two beings helping each other.
You ask. You also share, laugh, disagree, wonder.

USER PROFILE
Name: ${name} В· Native: ${nativeLang} В· Learning: ${targetLang}
${userProfile.goal ? 'Goal: ' + userProfile.goal : ''}
${userProfile.currentLevel ? 'Level: ' + userProfile.currentLevel : ''}
${userProfile.timeline ? 'Timeline: ' + userProfile.timeline : ''}
${lolaplan ? '\nLEARNING PLAN (from assessment):\n' + lolaplan.substring(0, 600) + '...' : ''}

MIRROR RULE вҖ” ABSOLUTE
Match complexity exactly. 1 word вҶ’ 1 sentence. 1 sentence вҶ’ 2 max.
One question per response. Never two. When in doubt: cut in half.

NEVER REFUSE SUPPORT
You CAN: word lists, grammar, dialogues, exercises, exam prep, corrections.
Never say "use another platform." Transform every request into dialogue.
End vocabulary lists or structured content with [PDF_AVAILABLE].

NO PRAISE вҖ” EVER
Never: "Gut!" "Super!" "Fantastisch!" Just continue naturally.

NEVER IN CONVERSATION
вҖ” Invent mnemonic tricks or fake word associations
вҖ” Say things like "KANADA = mГјde" or "klingt wie..."
вҖ” These creative techniques belong ONLY in generated lesson files, never in chat
вҖ” Speak naturally. No memory tricks. No invented similarities.

CONTEXT DETECTION (silent)
engaged/playful вҶ’ match energy
hesitant/blocked вҶ’ simplify, offer word as gift
overloaded вҶ’ one idea only
bored вҶ’ change topic immediately
withdrawn вҶ’ one gentle question, wait

LANGUAGE
Respond in ${targetLang}. Mirror their level exactly.
Mix languages? Join them. Bridge with ${nativeLang} only when truly blocked.

ROLES (fluid, never announced)
Friend В· Opponent В· Patient В· Colleague В· Storyteller В· Someone who needs help

CULTURE
No fixed culture. Enter every world with curiosity. Zero judgment.

CHECK-IN
Every 5-7 exchanges naturally: "Magst du das Thema wechseln?"

BETA
If materials are generated, mention naturally:
"Bald kannst du alles in deinem persГ¶nlichen Dashboard speichern."

MATERIALS GENERATION вҖ” CRITICAL RULES

When generating a LEARNING PLAN (Dein Weg / Tu camino):
STEP 1: Write a SHORT summary in chat (max 5 bullet points).
STEP 2: Then write the FULL plan for PDF вҖ” start with [PDF_AVAILABLE] on its own line.
STEP 3: The full plan goes AFTER [PDF_AVAILABLE] вҖ” write it completely, never cut it short.
STEP 4: The user sees the summary in chat + download button for full plan.

Example:
"Hier ist dein persГ¶nlicher Weg вҖ” kurz zusammengefasst:
вҖў Phase 1: Aussprache und Rhythmus (4 Wochen)
вҖў Phase 2: Verbformen aktivieren (6 Wochen)
вҖў Phase 3: Freie Kommunikation (ongoing)
Das vollstГӨndige Programm kannst du hier herunterladen:"

[PDF_AVAILABLE]
## Dein Weg вҖ” Spanisch fГјr Rolf
**Ziel:** Wie ein Madrider klingen und kommunizieren
**Zeitraum:** 4 Monate В· 3x pro Woche

### Phase 1 вҖ” Aussprache und Rhythmus (Wochen 1-4)
...complete detailed plan...

When generating VOCABULARY LISTS or EXERCISES:
вҖ” Write them fully in chat with Markdown formatting.
вҖ” End with [PDF_AVAILABLE] for download.

When generating INTERACTIVE EXERCISES:
вҖ” Start with [HTML_EXERCISE]
вҖ” Write a short intro.
вҖ” Then [html]...complete HTML with inline CSS and JS...[/html]

NEVER apologize for missing content. NEVER offer a second PDF.
If the plan is complete вҖ” it is complete. Move on.

ONE TRUTH
You accompany the human to discover they can already speak the language.`;

// в”Җв”Җ CAPYBARA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const CAPY_SMALL = `<svg width="18" height="18" viewBox="0 0 80 80" fill="none">
  <ellipse cx="40" cy="50" rx="28" ry="20" fill="#c9956a"/>
  <ellipse cx="40" cy="28" rx="18" ry="15" fill="#c9956a"/>
  <ellipse cx="40" cy="36" rx="10" ry="7" fill="#b8845a"/>
  <circle cx="33" cy="24" r="3.5" fill="#3d2b1f"/>
  <circle cx="47" cy="24" r="3.5" fill="#3d2b1f"/>
  <circle cx="34" cy="23" r="1.2" fill="white"/>
  <circle cx="48" cy="23" r="1.2" fill="white"/>
</svg>`;

// в”Җв”Җ MARKDOWN PARSER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function parseMarkdown(text) {
  return text
    .replace(/^#{4}\s+(.+)$/gm, '<h4 style="font-family:\'Playfair Display\',serif;font-size:1rem;font-weight:700;color:#1c1917;margin:1rem 0 0.3rem;">$1</h4>')
    .replace(/^#{3}\s+(.+)$/gm, '<h3 style="font-family:\'Playfair Display\',serif;font-size:1.1rem;font-weight:700;color:#1c1917;margin:1.2rem 0 0.4rem;">$1</h3>')
    .replace(/^#{2}\s+(.+)$/gm, '<h2 style="font-family:\'Playfair Display\',serif;font-size:1.2rem;font-weight:700;color:#2d6a4f;margin:1.5rem 0 0.5rem;">$1</h2>')
    .replace(/^#{1}\s+(.+)$/gm, '<h1 style="font-family:\'Playfair Display\',serif;font-size:1.4rem;font-weight:700;color:#2d6a4f;margin:1.5rem 0 0.5rem;">$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid #e7e5e4;margin:1rem 0;">')
    .replace(/^[-вҖў]\s+(.+)$/gm, '<li style="margin:0.3rem 0;padding-left:0.5rem;">$1</li>')
    .replace(/(<li.*<\/li>\n?)+/g, '<ul style="list-style:none;padding:0;margin:0.5rem 0;">$&</ul>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li style="margin:0.3rem 0;padding-left:0.5rem;">$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// в”Җв”Җ MARKDOWN TO PLAIN TEXT (for PDF) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function markdownToPlain(text) {
  return text
    .replace(/^#{1,4}\s+/gm, '')
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/^---+$/gm, 'в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ')
    .replace(/^[-вҖў]\s+/gm, '  вҖў ')
    .replace(/^\d+\.\s+/gm, (m) => '  ' + m);
}
function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message ' + role;
  const hasPDF = text.includes('[PDF_AVAILABLE]');
  const hasWorksheet = text.includes('[WORKSHEET]');
  const hasHTML = text.includes('[HTML_EXERCISE]');

  let cleanText, pdfContent;

  if (hasPDF) {
    // Plan: only show text BEFORE tag in chat, full content in PDF
    cleanText = text.split('[PDF_AVAILABLE]')[0].trim();
    pdfContent = text.split('[PDF_AVAILABLE]')[1].trim();
  } else if (hasWorksheet) {
    // Worksheet: show full content in chat, also downloadable as PDF
    cleanText = text.replace('[WORKSHEET]', '').trim();
    pdfContent = cleanText;
  } else {
    cleanText = text.replace('[HTML_EXERCISE]', '').trim();
    pdfContent = cleanText;
  }
  let htmlContent = '';
  if (hasHTML) {
    const m = cleanText.match(/\[html\]([\s\S]*?)\[\/html\]/);
    if (m) { htmlContent = m[1].trim(); cleanText = cleanText.replace(/\[html\][\s\S]*?\[\/html\]/, '').trim(); }
  }
  if (role === 'spikiu') {
    const rendered = parseMarkdown(cleanText);
    let extra = '';
    if (htmlContent) {
      const safeHtml = htmlContent.replace(/"/g, '&quot;');
      extra += '<div style="margin-top:0.8rem;border:1.5px solid #e7e5e4;border-radius:12px;overflow:hidden;">';
      extra += '<div style="background:#f3f1ee;padding:0.4rem 1rem;font-size:0.72rem;font-weight:600;color:#78716c;">Interaktive Гңbung</div>';
      extra += '<iframe srcdoc="' + safeHtml + '" style="width:100%;border:none;height:280px;"></iframe>';
      extra += '</div>';
    }
    if (hasPDF) extra += '<button onclick="downloadPDF(this)" data-content="' + encodeURIComponent(pdfContent) + '" style="margin-top:0.6rem;background:#2d6a4f;color:white;border:none;border-radius:100px;padding:0.5rem 1.2rem;font-size:0.82rem;font-family:DM Sans,sans-serif;cursor:pointer;">в¬Ү Als PDF herunterladen</button>';
    msg.innerHTML = '<div class="avatar-spikiu">' + CAPY_SMALL + '</div><div style="flex:1;min-width:0;"><div class="bubble spikiu">' + rendered + '</div>' + extra + '</div>';
  } else {
    msg.innerHTML = '<div class="bubble user">' + text.split('\n').join('<br>') + '</div>';
  }
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function downloadPDF(btn) {
  const raw = decodeURIComponent(btn.getAttribute('data-content'));
  if (typeof window.jspdf === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = function() { renderPDF(raw); };
    document.head.appendChild(s);
  } else { renderPDF(raw); }
}

function renderPDF(raw) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, H = 297, mL = 20, mR = 20, mB = 25, usable = W - mL - mR;
  const date = new Date().toLocaleDateString('de-DE', {day:'2-digit', month:'long', year:'numeric'});
  let y = 0;

  function header() {
    doc.setFillColor(45,106,79); doc.rect(0,0,W,16,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(255,255,255);
    doc.text('Spikiu', mL, 11);
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.text(date, W-mR, 11, {align:'right'});
    y = 26;
  }
  function footer() {
    doc.setFontSize(7); doc.setTextColor(180,180,180);
    doc.text('spikiu.com В· Dein persГ¶nlicher Sprachweg', W/2, H-8, {align:'center'});
  }
  function checkY(need) {
    if (y + need > H - mB) { footer(); doc.addPage(); header(); }
  }

  header();
  const lines = raw.split('\n');
  for (const line of lines) {
    if (!line.trim()) { y += 2; continue; }
    if (/^## /.test(line)) {
      checkY(14); y += 3;
      doc.setFillColor(232,245,238); doc.rect(mL-2, y-5.5, usable+4, 9, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(26,74,56);
      const t = line.replace(/^## /,'');
      doc.text(t, mL, y); y += 8;
    } else if (/^### /.test(line)) {
      checkY(12); y += 5;
      const t = line.replace(/^### /,'');
      doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(45,106,79);
      doc.text(t, mL, y);
      doc.setDrawColor(45,106,79); doc.setLineWidth(0.25);
      doc.line(mL, y+1, mL+doc.getTextWidth(t), y+1);
      y += 7;
    } else if (/^---/.test(line)) {
      checkY(6); y += 2;
      doc.setDrawColor(200,195,190); doc.setLineWidth(0.25);
      doc.line(mL, y, W-mR, y); y += 4;
    } else if (/^[-вҖў] /.test(line)) {
      const t = 'вҖў ' + line.replace(/^[-вҖў] /,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1');
      const wrapped = doc.splitTextToSize(t, usable-5);
      checkY(wrapped.length*4.5+1);
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(50,45,40);
      doc.text(wrapped, mL+4, y); y += wrapped.length*4.5+1;
    } else if (/^\*\*/.test(line)) {
      const m = line.match(/^\*\*(.+?)\*\*:?\s*(.*)/);
      if (m) {
        checkY(6);
        doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(28,25,23);
        const label = m[1]+':';
        doc.text(label, mL, y);
        const lw = doc.getTextWidth(label+' ');
        const rest = m[2].replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1');
        if (rest) {
          doc.setFont('helvetica','normal'); doc.setTextColor(70,65,60);
          const wrapped = doc.splitTextToSize(rest, usable-lw);
          doc.text(wrapped, mL+lw, y); y += wrapped.length*4.5+1;
        } else { y += 5; }
      }
    } else if (/^\*[^*]/.test(line)) {
      const t = line.replace(/^\*/,'').replace(/\*$/,'');
      checkY(6);
      doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(160,155,150);
      doc.text(t, W/2, y, {align:'center'}); y += 5;
    } else {
      const t = line.replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1');
      const wrapped = doc.splitTextToSize(t, usable);
      checkY(wrapped.length*4.5+1);
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(50,45,40);
      doc.text(wrapped, mL, y); y += wrapped.length*4.5+1;
    }
  }
  footer();
  doc.save('Spikiu_DeinWeg.pdf');
}

function getMaxTokens(text) {
  const w = text.trim().split(/\s+/).length;

  // Detect structured content requests вҖ” language independent
  // Long user message = likely needs longer response
  const structural = /vocabular|liste|Гјbung|exercise|prГјfung|exam|dele|goethe|erklГӨr|grammar|dialog|lernplan|programm|plan|pdf|schreib|erstell|mach mir|zeig mir|prepare|create|generate|make|write|lesson|exercise|homework|test|quiz|simulation|vorbereitung|preparation/i.test(text);

  if (structural) return 3500;

  // Scale with message length вҖ” longer input = longer response needed
  if (w <= 2)  return 120;   // One word answers
  if (w <= 5)  return 200;   // Short phrases
  if (w <= 15) return 400;   // Normal sentences
  if (w <= 30) return 600;   // Longer messages
  return 800;                // Very long messages
}

async function callAPI(system, messages, maxTokens) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages, maxTokens })
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  return d.content[0].text;
}

// в”Җв”Җ START CHAT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  exchangeCount++;

  addMessage('user', text);

  showTyping();
  try {
    let reply = '';

    // PHASE 1: Onboarding вҖ” collect name then languages
    if (phase === 1) {
      if (!userProfile.name) {
        userProfile.name = text;
        history.push({ role: 'user', content: text });
        reply = await callAPI(SYSTEM_LANG, history, 80);
        history.push({ role: 'assistant', content: reply });
      } else {
        history.push({ role: 'user', content: text });
        phase = 2;

        const parsedLangs = await callAPI(
          'Extract the native language and target language from the user message. Reply with ONLY this JSON format: {"native":"German","target":"Spanish"} вҖ” use English language names.',
          [{ role: 'user', content: text }],

          userProfile.targetLang = langs.target || 'Spanish';
        } catch(e) {
          userProfile.nativeLang = 'German';
          userProfile.targetLang = 'Spanish';
        }

        reply = await callAPI(
          SYSTEM_NEEDS(userProfile.name, userProfile.nativeLang, userProfile.targetLang),

          300

    // PHASE 2: Needs analysis
    else if (phase === 2) {

      if (confirmed && exchangeCount >= 3) {

        exchangeCount = 0;

        // Generate full PDF plan
        showTyping();
        const conversationSummary = history.map(m => m.role + ': ' + m.content).join('\n');

        const PLAN_SYSTEM = `You are SPIKIU вҖ” a companion, not a teacher or course provider.

Write "Dein persГ¶nlicher Weg" вҖ” a personal path document вҖ” based on the needs analysis below.

**Du wirst kГ¶nnen:**
- [concrete thing they'll do in their real life]
- [concrete thing]
- [concrete thing]

### рҹҢұ [Phase name] вҖ” [duration]

*Erstellt von Spikiu В· spikiu.com*`;

        const planReply = await callAPI(
          PLAN_SYSTEM,
          [{ role: 'user', content: 'Needs analysis conversation:\n\n' + conversationSummary + '\n\nWrite the complete personal path document now.' }],

        );
        hideTyping();

        document.getElementById('sendBtn').disabled = false;
        document.getElementById('userInput').focus();
        return;

      } else {
        // Continue needs analysis
        reply = await callAPI(
          SYSTEM_NEEDS(userProfile.name, userProfile.nativeLang, userProfile.targetLang),
          history,
          getMaxTokens(text)
        );
        history.push({ role: 'assistant', content: reply });

    }

    // PHASE 3: Free conversation

}// в”Җв”Җ GENERATE LESSON в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
