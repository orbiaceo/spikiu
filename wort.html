<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wort des Tages — Spikiu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Instrument+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--white:#ffffff;--off:#faf8f5;--off2:#f2ede6;--ink:#1a1612;--mid:#6b6158;--faint:#e8e0d5;--warm:#c8bfb0;--green:#2d5a3d;--green2:#e5efe8;--green3:#1a3d28;--gold:#a07228;--gold2:#f5ead8;--capy:#c9956a;}
body{background:var(--off);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;}
header{background:var(--white);border-bottom:1px solid var(--faint);padding:0 5vw;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.logo-text em{color:var(--green);font-style:italic;}
.nav-link{font-size:.83rem;color:var(--mid);text-decoration:none;}

main{max-width:680px;margin:0 auto;padding:3rem 5vw 5rem;}

/* DATE */
.date-label{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--warm);margin-bottom:2rem;display:block;text-align:center;}

/* WORD CARD */
.word-card{background:var(--ink);border-radius:20px;padding:2.5rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.word-card::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(160,114,40,0.2) 0%,transparent 70%);pointer-events:none;}
.word-lang{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:1rem;}
.word-main{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,8vw,4rem);font-weight:900;color:var(--white);line-height:1;margin-bottom:.5rem;letter-spacing:-.02em;}
.word-pron{font-size:.88rem;color:var(--gold);font-weight:600;margin-bottom:.8rem;letter-spacing:.02em;}
.word-meaning{font-family:'Lora',serif;font-size:1.1rem;color:rgba(255,255,255,.7);font-style:italic;}

/* STORY */
.story-card{background:var(--white);border:1px solid var(--faint);border-radius:16px;padding:1.8rem;margin-bottom:1.2rem;}
.story-label{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:1rem;}
.story-text{font-family:'Lora',serif;font-size:.97rem;line-height:1.85;color:var(--ink);}
.story-text em{color:var(--green);font-style:normal;font-weight:600;}

/* EXAMPLES */
.examples-card{background:var(--gold2);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:1.5rem;margin-bottom:1.2rem;}
.example{font-family:'Lora',serif;font-size:.95rem;line-height:1.7;color:var(--ink);margin-bottom:.6rem;}
.example:last-child{margin-bottom:0;}
.example em{font-style:italic;color:var(--gold);}

/* SPIKIU INVITE */
.invite{background:var(--green);border-radius:16px;padding:1.8rem;text-align:center;margin-bottom:1.5rem;}
.invite-text{font-family:'Lora',serif;font-size:.97rem;color:rgba(255,255,255,.8);font-style:italic;margin-bottom:1rem;line-height:1.7;}
.btn-practice{display:inline-block;background:rgba(255,255,255,.15);color:var(--white);padding:.7rem 1.6rem;border-radius:100px;font-size:.88rem;font-weight:600;text-decoration:none;border:1.5px solid rgba(255,255,255,.3);transition:all .2s;}
.btn-practice:hover{background:rgba(255,255,255,.25);}

/* ARCHIVE */
.archive-label{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;}
.archive-label::after{content:'';flex:1;height:1px;background:var(--faint);}
.archive-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;}
.archive-item{background:var(--white);border:1px solid var(--faint);border-radius:10px;padding:.9rem;text-align:center;cursor:pointer;transition:all .2s;}
.archive-item:hover{border-color:var(--green);}
.arch-word{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--ink);}
.arch-meaning{font-size:.78rem;color:var(--mid);margin-top:.2rem;}
.arch-lang{font-size:.65rem;color:var(--warm);margin-top:.1rem;}

/* LOADING */
.loading{text-align:center;padding:4rem 2rem;color:var(--mid);}
.loading-dots span{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;margin:0 3px;animation:dot 1.4s infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

@media(max-width:600px){
  header{padding:0 1.25rem;}
  main{padding:2rem 1.25rem 4rem;}
  .archive-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <svg width="28" height="28" viewBox="0 0 80 80" fill="none">
      <ellipse cx="40" cy="50" rx="28" ry="20" fill="#c9956a"/>
      <ellipse cx="40" cy="28" rx="18" ry="15" fill="#c9956a"/>
      <ellipse cx="40" cy="36" rx="10" ry="7" fill="#b8845a"/>
      <circle cx="33" cy="24" r="3.5" fill="#3d2b1f"/>
      <circle cx="47" cy="24" r="3.5" fill="#3d2b1f"/>
      <circle cx="34" cy="23" r="1.2" fill="white"/>
      <circle cx="48" cy="23" r="1.2" fill="white"/>
      <path d="M36 38 Q40 41 44 38" stroke="#8b5e3c" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="logo-text">Spi<em>k</em>iu</span>
  </a>
  <a href="index.html" class="nav-link">← Zurück</a>
</header>

<main>
  <span class="date-label" id="dateLabel"></span>
  <div id="wordContent">
    <div class="loading">
      <p style="margin-bottom:1rem">Spikiu wählt dein Wort des Tages...</p>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div style="margin-top:2.5rem">
    <div class="archive-label">Letzte Wörter</div>
    <div class="archive-grid" id="archiveGrid"></div>
  </div>
</main>

<script>
const API = '/api/chat';

// Curated word list — alternates DE/ES daily
const WORDS = [
  {word:'Fernweh',lang:'Deutsch',pron:'FERN-veh',meaning:'Die Sehnsucht nach der Ferne',story:'Es gibt kein englisches Wort dafür. Fernweh ist der Zug, der dich morgens weckt — nicht der Wecker, sondern der Horizont.',examples:['Ich habe so ein Fernweh heute.','Das Fernweh hat mich nach Madrid gebracht.'],invite:'Hast du auch Fernweh? Erzähl Spikiu wohin du möchtest.'},
  {word:'madrugada',lang:'Spanisch',pron:'ma-dru-GA-da',meaning:'Die Stunden zwischen Mitternacht und Morgengrauen',story:'Im Deutschen gibt es kein Wort dafür. Madrugada ist die Zeit, die zu spät für gestern und zu früh für heute ist.',examples:['Llegué a casa en la madrugada.','Madrid vive en la madrugada.'],invite:'Bist du ein Nachtmensch? Spikiu fragt dich — auf Spanisch.'},
  {word:'Zweisamkeit',lang:'Deutsch',pron:'TSVAI-sam-kait',meaning:'Das Glück zu zweit',story:'Nicht Einsamkeit, nicht Gesellschaft. Zweisamkeit ist der Raum zwischen zwei Menschen, der sich anfühlt wie Zuhause.',examples:['Wir genießen die Zweisamkeit.','In der Zweisamkeit braucht man keine Worte.'],invite:'Was bedeutet Zweisamkeit für dich? Sprich mit Spikiu darüber.'},
  {word:'sobremesa',lang:'Spanisch',pron:'so-bre-ME-sa',meaning:'Die Zeit nach dem Essen, wenn man einfach sitzt und redet',story:'In Spanien ist das Essen nie fertig wenn der Teller leer ist. Sobremesa ist der Kern des Abends.',examples:['La sobremesa duró hasta las cuatro.','En España, la sobremesa es sagrada.'],invite:'Was isst du am liebsten? Erzähl Spikiu davon — auf Spanisch.'},
  {word:'Weltschmerz',lang:'Deutsch',pron:'VELT-shmerts',meaning:'Der Schmerz über den Zustand der Welt',story:'Thomas Mann kannte es. Du kennst es auch — dieses schwere Gefühl, wenn die Nachrichten zu viel werden.',examples:['Ein bisschen Weltschmerz gehört dazu.','Kein Weltschmerz heute — nur Kaffee.'],invite:'Wie gehst du mit dem Weltschmerz um? Spikiu hört zu.'},
  {word:'añoranza',lang:'Spanisch',pron:'a-nyo-RAN-sa',meaning:'Tiefe Sehnsucht nach etwas Vergangenem',story:'Mehr als Nostalgie. Añoranza ist der Schmerz der schönen Erinnerung — das Spanische versteht die Gefühle tiefer.',examples:['Tengo añoranza de mi pueblo.','La añoranza del verano pasado.'],invite:'Was vermisst du gerade? Sag es Spikiu — auf Spanisch.'},
  {word:'Geborgenheit',lang:'Deutsch',pron:'ge-BOR-gen-hait',meaning:'Das Gefühl von Sicherheit und Wärme',story:'Kein direktes Wort im Englischen oder Spanischen. Geborgenheit ist der Moment, wenn du weißt: Hier bin ich sicher.',examples:['Bei ihr fühle ich Geborgenheit.','Ein altes Haus voller Geborgenheit.'],invite:'Wo fühlst du dich geborgen? Erzähl Spikiu davon.'},
  {word:'mariposa',lang:'Spanisch',pron:'ma-ri-PO-sa',meaning:'Schmetterling',story:'Das schönste Wort für das schönste Insekt. Mariposa klingt wie Flügel.',examples:['Una mariposa azul voló por la ventana.','Tengo mariposas en el estómago.'],invite:'Hast du auch Schmetterlinge im Bauch? Spikiu fragt auf Spanisch.'},
];

function getTodayIndex() {
  const start = new Date('2024-01-01');
  const today = new Date();
  const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  return diff % WORDS.length;
}

function getArchive() {
  const idx = getTodayIndex();
  const result = [];
  for (let i = 1; i <= 6; i++) {
    result.push(WORDS[(idx - i + WORDS.length) % WORDS.length]);
  }
  return result;
}

function renderWord(w) {
  const exHtml = w.examples.map(e => `<div class="example">${e.replace(new RegExp(w.word,'gi'), m => `<em>${m}</em>`)}</div>`).join('');
  return `
    <div class="word-card">
      <div class="word-lang">${w.lang === 'Deutsch' ? 'Deutsch 🇩🇪' : 'Español 🇪🇸'}</div>
      <div class="word-main">${w.word}</div>
      <div class="word-pron">${w.pron}</div>
      <div class="word-meaning">${w.meaning}</div>
    </div>
    <div class="story-card">
      <div class="story-label">Die Geschichte</div>
      <p class="story-text">${w.story}</p>
    </div>
    <div class="examples-card">
      <div class="story-label" style="margin-bottom:.8rem">Beispiele</div>
      ${exHtml}
    </div>
    <div class="invite">
      <p class="invite-text">"${w.invite}"</p>
      <a href="chat.html" class="btn-practice">Mit Spikiu üben 🐾</a>
    </div>`;
}

function renderArchive() {
  const archive = getArchive();
  const grid = document.getElementById('archiveGrid');
  grid.innerHTML = archive.map(w => `
    <div class="archive-item">
      <div class="arch-word">${w.word}</div>
      <div class="arch-meaning">${w.meaning.length > 30 ? w.meaning.slice(0,28)+'…' : w.meaning}</div>
      <div class="arch-lang">${w.lang}</div>
    </div>`).join('');
}

function init() {
  // Date label
  const date = new Date().toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('dateLabel').textContent = date;

  // Today's word
  const today = WORDS[getTodayIndex()];
  document.getElementById('wordContent').innerHTML = renderWord(today);

  // Archive
  renderArchive();
}

init();
</script>
</body>
</html>
