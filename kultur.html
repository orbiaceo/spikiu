<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulturschock des Tages — Spikiu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Instrument+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--white:#ffffff;--off:#faf8f5;--off2:#f2ede6;--ink:#1a1612;--mid:#6b6158;--faint:#e8e0d5;--warm:#c8bfb0;--green:#2d5a3d;--green2:#e5efe8;--green3:#1a3d28;--gold:#a07228;--gold2:#f5ead8;--capy:#c9956a;}
body{background:var(--off);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh;}

header{background:var(--white);border-bottom:1px solid var(--faint);padding:0 5vw;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;}
.logo-text{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.logo-text em{color:var(--green);font-style:italic;}
.nav-link{font-size:.83rem;color:var(--mid);text-decoration:none;transition:color .2s;}
.nav-link:hover{color:var(--ink);}

main{max-width:680px;margin:0 auto;padding:3rem 5vw 5rem;}

.date-label{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--warm);margin-bottom:2rem;display:block;text-align:center;}

/* MAIN CARD */
.shock-card{border-radius:20px;overflow:hidden;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(0,0,0,0.1);}
.shock-top{padding:2.5rem;position:relative;overflow:hidden;}
.shock-top::before{content:'';position:absolute;top:-40%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);pointer-events:none;}
.shock-country{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;opacity:.6;margin-bottom:.8rem;}
.shock-emoji{font-size:3rem;margin-bottom:.8rem;display:block;line-height:1;}
.shock-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,1.9rem);font-weight:700;color:var(--white);line-height:1.2;letter-spacing:-.01em;}

/* DE card = dark green, ES card = dark red */
.card-de .shock-top{background:linear-gradient(135deg,#1a3d28 0%,#2d5a3d 100%);}
.card-es .shock-top{background:linear-gradient(135deg,#6b0a12 0%,#a01020 100%);}

/* STORY */
.shock-body{background:var(--white);padding:2rem;}
.shock-story{font-family:'Lora',serif;font-size:.97rem;line-height:1.85;color:var(--ink);margin-bottom:1.2rem;}
.shock-insight{background:var(--gold2);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.9rem 1.1rem;font-size:.9rem;color:var(--ink);line-height:1.65;margin-bottom:1.5rem;}
.shock-insight strong{color:var(--gold);font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:.3rem;}

/* SPIKIU QUESTION */
.shock-question{background:var(--green);border-radius:12px;padding:1.3rem 1.5rem;display:flex;flex-direction:column;gap:.8rem;}
.sq-label{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);}
.sq-text{font-family:'Lora',serif;font-size:.95rem;color:var(--white);font-style:italic;line-height:1.6;}
.btn-chat{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.15);color:var(--white);padding:.55rem 1.1rem;border-radius:100px;font-size:.82rem;font-weight:600;border:1.5px solid rgba(255,255,255,.3);text-decoration:none;transition:all .2s;align-self:flex-start;}
.btn-chat:hover{background:rgba(255,255,255,.25);}

/* SHARE */
.share-bar{display:flex;gap:.8rem;margin-bottom:2rem;flex-wrap:wrap;}
.btn-share{display:inline-flex;align-items:center;gap:.5rem;background:var(--white);color:var(--ink);padding:.6rem 1.2rem;border-radius:100px;font-size:.83rem;font-weight:600;border:1.5px solid var(--faint);cursor:pointer;transition:all .2s;font-family:'Instrument Sans',sans-serif;}
.btn-share:hover{border-color:var(--green);color:var(--green);}

/* ARCHIVE */
.section-head{font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;}
.section-head::after{content:'';flex:1;height:1px;background:var(--faint);}
.archive-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.archive-card{background:var(--white);border:1px solid var(--faint);border-radius:12px;padding:1rem 1.1rem;cursor:pointer;transition:all .2s;}
.archive-card:hover{border-color:var(--green);transform:translateY(-2px);}
.arch-flag{font-size:1.1rem;margin-bottom:.3rem;}
.arch-title{font-size:.88rem;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:.2rem;}
.arch-country{font-size:.72rem;color:var(--warm);}

/* NAVIGATION */
.card-nav{display:flex;justify-content:space-between;align-items:center;margin-top:-.5rem;margin-bottom:1.5rem;}
.nav-dots{display:flex;gap:.4rem;}
.nav-dot{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:background .2s;}
.nav-dot.active{background:var(--green);}
.btn-nav{background:none;border:1.5px solid var(--faint);border-radius:100px;padding:.4rem .9rem;font-size:.78rem;font-weight:600;color:var(--mid);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all .2s;}
.btn-nav:hover{border-color:var(--green);color:var(--green);}

@media(max-width:600px){
  header{padding:0 1.25rem;}
  main{padding:2rem 1.25rem 4rem;}
  .archive-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <svg width="28" height="28" viewBox="0 0 80 80" fill="none">
      <ellipse cx="40" cy="50" rx="28" ry="20" fill="#c9956a"/><ellipse cx="40" cy="28" rx="18" ry="15" fill="#c9956a"/>
      <ellipse cx="40" cy="36" rx="10" ry="7" fill="#b8845a"/><circle cx="33" cy="24" r="3.5" fill="#3d2b1f"/>
      <circle cx="47" cy="24" r="3.5" fill="#3d2b1f"/><circle cx="34" cy="23" r="1.2" fill="white"/>
      <circle cx="48" cy="23" r="1.2" fill="white"/><path d="M36 38 Q40 41 44 38" stroke="#8b5e3c" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </svg>
    <span class="logo-text">Spi<em>k</em>iu</span>
  </a>
  <a href="index.html" class="nav-link">← Zurück</a>
</header>

<main>
  <span class="date-label" id="dateLabel"></span>
  <div id="mainCard"></div>
  <div class="card-nav">
    <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">← Zurück</button>
    <div class="nav-dots" id="navDots"></div>
    <button class="btn-nav" id="btnNext" onclick="navigate(1)">Weiter →</button>
  </div>
  <div class="share-bar">
    <button class="btn-share" onclick="shareCard()">Teilen 😯</button>
    <a href="wort.html" class="btn-share">📖 Wort des Tages</a>
    <a href="test.html" class="btn-share">🌱 Sprachtest</a>
  </div>
  <div style="margin-top:1.5rem">
    <div class="section-head">Weitere Kulturschocks</div>
    <div class="archive-grid" id="archiveGrid"></div>
  </div>
</main>

<script>
const CARDS = [
  // DEUTSCHLAND

    insight: 'Wenn du pünktlich bist, fällst du nicht auf. Wenn du zu spät kommst — schon.',
    question: 'Du kommst zu einem deutschen Kollegen zum Abendessen. Was machst du?',
    chatTopic: 'Pünktlichkeit und Zeitgefühl in Deutschland'
  },

    story: 'In vielen Ländern ist man nach einer Woche beim Vornamen. In Deutschland kann das Monate dauern — manchmal Jahre.\n\nDas Du anbieten ist ein Akt. Ein echter Moment. Wenn jemand sagt "Wir können uns duzen" — das ist Vertrauen, kein Formalismus.',
    insight: 'Das Sie ist kein Abstand. Es ist Respekt vor der anderen Person, bevor du sie wirklich kennst.',

    emoji: '🛒',

    story: 'Du brauchst Milch. Es ist Sonntag. Der Supermarkt: zu. Die Apotheke (außer Notfall): zu. Das Kaufhaus: zu.\n\nIn Deutschland ist der Sonntag heilig — nicht religiös, sondern kulturell. Es ist der Tag der Ruhe. Für alle. Auch für die Nachbarn: kein Bohren, kein Rasenmähen vor 10 Uhr.',
    insight: 'Plane deinen Wocheneinkauf für Samstag. Sonntag ist für Menschen — nicht für Konsum.',

    title: 'Jemand sagt dir direkt was er denkt. Das ist hier ein Kompliment.',
    story: 'Du zeigst deinem deutschen Kollegen deine Präsentation. Er sagt: "Die Struktur ist gut, aber Folie 3 macht keinen Sinn."\n\nKein Lächeln. Kein "sehr schön, aber...". Einfach direkt.\n\nIn vielen Kulturen wäre das unhöflich. In Deutschland ist es Respekt. Er nimmt dich ernst genug, um ehrlich zu sein.',

    emoji: '🚴',
    title: 'Du gehst auf dem Fahrradweg. Das ist ein Fehler.',
    story: 'Du spazierst auf einem breiten Weg. Plötzlich: eine Klingel von hinten. Laut. Ungeduldig.\n\nDu stehst auf dem Radweg. In Deutschland sind Radwege — oft rot markiert oder mit einem Fahrrad-Symbol — ausschließlich für Fahrräder. Fußgänger auf dem Radweg sind nicht nur unhöflich. Es kann teuer werden.',
    insight: 'Schau immer auf den Boden: Rotes Pflaster oder Fahrradsymbol = Radweg = nicht dein Platz.',
    question: 'Erkläre einem Freund auf Deutsch den Unterschied zwischen Bürgersteig und Radweg.',
    chatTopic: 'Regeln im deutschen Straßenverkehr für Fußgänger'
  },
  // SPANIEN / LATEINAMERIKA
  {
    lang: 'es', flag: '🇪🇸', country: 'España',
    emoji: '🍽️',
    title: 'La cena es a las 21h. No llegues a las 21h.',
    story: 'Te invitan a cenar a las 21 horas. Llegas puntual. La anfitriona aún está en la ducha. El vino no está abierto. La cocina huele a "casi listo".\n\nEn España, la hora de una invitación es orientativa. Llegar 20-30 minutos tarde no es falta de respeto — es dar tiempo al anfitrión.',
    insight: 'La puntualidad española es elástica. Aprende a leer el contexto: trabajo = puntual. Cena en casa = relax.',
    question: '¿A qué hora llegarías a una cena en casa de un amigo español que empieza "a las 21h"?',
    chatTopic: 'El tiempo y la puntualidad en la cultura española'
  },
  {
    lang: 'es', flag: '🇪🇸', country: 'España',

    title: 'La sobremesa. Cuando termina la comida — empieza lo mejor.',
    story: 'Los platos están vacíos. En muchos países, esto significa: hora de irse. En España significa: ahora empieza la conversación de verdad.\n\nLa sobremesa puede durar 2 horas. Se habla de política, familia, fútbol, vida. Levantarse antes es casi una ofensa.',
    insight: 'En España, la comida es la excusa. La sobremesa es el propósito.',
    question: '¿Cómo se llama en alemán el momento de quedarse charlando después de comer?',
    chatTopic: 'La sobremesa y la cultura de la conversación en España'
  },
  {
    lang: 'es', flag: '🇪🇸', country: 'España',
    emoji: '😘',
    title: 'Dos besos. Siempre. Con personas que acabas de conocer.',
    story: 'Llegas a una reunión. Te presentan a cinco personas que no conoces. Cinco besos en la mejilla. Esto es normal.\n\nEn España, los dos besos son el saludo estándar entre personas que se acaban de conocer — especialmente cuando hay una mujer involucrada. No es intimidad. Es protocolo.',
    insight: 'No esperes a que te los den — inícialos tú. Dudar crea ese momento incómodo que todos conocemos.',
    question: 'Acabas de conocer a la jefa de tu colega español. ¿Cómo la saludas?',
    chatTopic: 'Saludos y contacto físico en la cultura española'
  },
  {
    lang: 'es', flag: '🇪🇸', country: 'España',
    emoji: '🔊',
    title: 'El ruido no es descortesía. Es vida.',
    story: 'Son las 23h en un barrio de Madrid. Hay niños jugando en la calle. Familias cenando con las ventanas abiertas. Una terraza de bar al lado.\n\nEn muchos países del norte esto sería escandaloso. En España es un martes normal.\n\nEl silencio absoluto a ciertas horas no es la norma — es la excepción.',
    insight: 'Adapta tus expectativas de ruido. Lo que parece caos es simplemente otra forma de vivir en comunidad.',
    question: 'Vives en Madrid. Son las 22h y hay ruido en la calle. ¿Cómo lo describes en alemán?',
    chatTopic: 'La vida nocturna y el ruido en las ciudades españolas'
  },
  {
    lang: 'es', flag: '🇲🇽', country: 'México',
    emoji: '🌮',
    title: '"Ahorita" no significa ahora.',
    story: 'Le pides a alguien que te ayude. Te dice "ahorita". Esperas 5 minutos. Luego 20. Luego una hora.\n\nEn México, "ahorita" puede significar ahora mismo, en un rato, hoy, mañana, o nunca. El contexto y el tono lo deciden todo.',
    insight: '"Ahora" = inmediato. "Ahorita" = pronto pero sin compromiso. "Al rato" = más tarde. Aprende la diferencia.',
    question: 'Tu colega mexicano dice "ahorita te mando el documento". ¿Cuándo lo esperas?',
    chatTopic: 'El tiempo y los modismos mexicanos del español'

  {
    lang: 'de', flag: '🇩🇪', country: 'Deutschland',
    emoji: '🍺',
    title: 'Bevor du trinkst — schau allen in die Augen.',
    story: 'Das Bier kommt. Alle heben das Glas. Dein Gastgeber sagt "Prost". Du trinkst.\n\nWarte. Du hast vergessen, jedem einzeln in die Augen zu schauen beim Anstoßen.\n\nIn Deutschland gilt: wer beim Prosten den Blickkontakt vermeidet, bringt sieben Jahre schlechten Sex. Das sagen zumindest die Deutschen.',
    insight: 'Beim Anstoßen: Augenkontakt mit jeder Person. Kurz aber ernst. Das ist hier Respekt am Tisch.',
    question: 'Du bist bei einem deutschen Abendessen. Wie stößt du richtig an?',
    chatTopic: 'Deutsche Trinkrituale und Tischmanieren'
  },
  {
    lang: 'es', flag: '🇪🇸', country: 'España',
    emoji: '🏖️',
    title: 'Agosto. Madrid está vacía. Das ist normal.',
    story: 'Tienes una reunión importante en agosto en Madrid. Tu contacto te dice que está de vacaciones. Su sustituto también. La empresa cierra del 1 al 31.\n\nEn España, agosto no existe para los negocios. El país entero se va a la playa.',
    insight: 'No programes nada importante en España durante agosto. Ni en Semana Santa. Ni en Navidad.',
    question: '¿Cómo explicas en alemán que en España agosto es vacaciones para todos?',
    chatTopic: 'Las vacaciones y el ritmo laboral en España'
  },
  {
    lang: 'de', flag: '🇩🇪', country: 'Deutschland',
    emoji: '♻️',
    title: 'Mülltrennung. Das ist kein Hobby — das ist Pflicht.',
    story: 'Du hast eine leere Flasche. Du wirfst sie in den nächsten Mülleimer. Dein Nachbar schaut dich an wie ein Verbrecher.\n\nIn Deutschland gibt es: Gelbe Tonne (Plastik), Blaue Tonne (Papier), Braune Tonne (Biomüll), Schwarze Tonne (Restmüll), Glascontainer (nach Farbe getrennt) und Pfandflaschen.',
    insight: 'Mülltrennung falsch machen ist in Deutschland eine ernste Sache. Lern das System — deine Nachbarn werden es merken.',
    question: 'Erkläre einem Freund auf Deutsch wo man eine leere Glasflasche entsorgt.',

];

let currentIdx = 0;

function getTodayIndex() {
  const start = new Date('2024-01-01');
  const today = new Date();
  const diff = Math.floor((today - start) / (1000*60*60*24));
  return diff % CARDS.length;
}

function renderCard(idx) {
  const c = CARDS[idx];
  const isDE = c.lang === 'de';
  const chatUrl = `chat.html?topic=${encodeURIComponent(c.chatTopic)}`;

  document.getElementById('mainCard').innerHTML = `
    <div class="shock-card card-${c.lang}">
      <div class="shock-top">
        <div class="shock-country">${c.flag} ${c.country}</div>
        <span class="shock-emoji">${c.emoji}</span>
        <div class="shock-title">${c.title}</div>
      </div>
      <div class="shock-body">
        <p class="shock-story">${c.story.replace(/\n\n/g,'</p><p class="shock-story" style="margin-top:.8rem">')}</p>
        <div class="shock-insight">
          <strong>${isDE ? 'Was das bedeutet' : 'Lo que significa'}</strong>
          ${c.insight}
        </div>
        <div class="shock-question">
          <span class="sq-label">Spikiu fragt dich</span>
          <p class="sq-text">"${c.question}"</p>
          <a href="chat.html" class="btn-chat">${isDE ? 'Mit Spikiu üben →' : 'Practicar con Spikiu →'}</a>
        </div>
      </div>
    </div>`;

  // Update dots
  const dots = document.getElementById('navDots');
  const total = Math.min(CARDS.length, 8);
  dots.innerHTML = Array.from({length: total}, (_,i) =>
    `<div class="nav-dot ${i === idx % total ? 'active' : ''}"></div>`
  ).join('');

  // Update nav buttons
  document.getElementById('btnPrev').disabled = false;
  document.getElementById('btnNext').disabled = false;
}

function navigate(dir) {
  currentIdx = (currentIdx + dir + CARDS.length) % CARDS.length;
  renderCard(currentIdx);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderArchive() {
  const others = CARDS
    .map((c,i) => ({...c, i}))
    .filter(c => c.i !== currentIdx)
    .slice(0, 6);

  document.getElementById('archiveGrid').innerHTML = others.map(c => `
    <div class="archive-card" onclick="currentIdx=${c.i};renderCard(${c.i});window.scrollTo({top:0,behavior:'smooth'})">
      <div class="arch-flag">${c.flag}</div>
      <div class="arch-title">${c.emoji} ${c.title.length > 55 ? c.title.slice(0,55)+'…' : c.title}</div>
      <div class="arch-country">${c.country}</div>
    </div>`).join('');
}

function shareCard() {
  const c = CARDS[currentIdx];
  const text = `😯 ${c.emoji} ${c.title}\n\n${c.insight}\n\nspikiu.com/kultur.html`;
  if (navigator.share) {
    navigator.share({title: 'Spikiu Kulturschock', text, url: 'https://spikiu.com/kultur.html'});
  } else {
    navigator.clipboard.writeText(text);
    const btn = document.querySelector('.btn-share');
    btn.textContent = '✓ Kopiert!';
    setTimeout(() => btn.textContent = 'Teilen 😯', 2000);
  }
}

function init() {
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});
  currentIdx = getTodayIndex();
  renderCard(currentIdx);
  renderArchive();
}

init();
</script>
</body>
</html>
